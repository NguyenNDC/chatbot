services:
  retrieval-service:
    build:
      args:
        REQUIREMENTS_GROUPS: base,graph,ml
    environment:
      EMBEDDING_PROVIDER: e5
      EMBEDDING_MODEL_NAME: intfloat/multilingual-e5-base
      PRELOAD_EMBEDDING_MODEL: "true"

  worker-runner:
    build:
      args:
        REQUIREMENTS_GROUPS: base,queue,storage,graph,parsing,ml
    environment:
      EMBEDDING_PROVIDER: e5
      EMBEDDING_MODEL_NAME: intfloat/multilingual-e5-base
      PRELOAD_EMBEDDING_MODEL: "true"
