services:
  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway

  api-gateway:
    build:
      context: .
      dockerfile: infra/docker/python-service.Dockerfile
      args:
        SERVICE_PATH: services/api-gateway/app
        SERVICE_PORT: 8000
        REQUIREMENTS_GROUPS: base
    env_file: .env
    environment:
      SERVICE_NAME: api-gateway
      SERVICE_PORT: 8000
      DOCUMENT_SERVICE_URL: http://document-service:8001
      RETRIEVAL_SERVICE_URL: http://retrieval-service:8002
      GRAPH_SERVICE_URL: http://graph-service:8003
      LLM_SERVICE_URL: http://llm-orchestrator:8004
      WORKER_SERVICE_URL: http://worker:8005
    ports:
      - "8000:8000"
    depends_on:
      - document-service
      - retrieval-service
      - graph-service
      - llm-orchestrator

  document-service:
    build:
      context: .
      dockerfile: infra/docker/python-service.Dockerfile
      args:
        SERVICE_PATH: services/document-service/app
        SERVICE_PORT: 8001
        REQUIREMENTS_GROUPS: ${DOCUMENT_SERVICE_REQUIREMENTS_GROUPS:-base,queue,storage,graph}
        INSTALL_OCR_SYSTEM_DEPS: ${DOCUMENT_SERVICE_INSTALL_OCR_SYSTEM_DEPS:-false}
    env_file: .env
    environment:
      SERVICE_NAME: document-service
      SERVICE_PORT: 8001
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      rustfs:
        condition: service_started
      rabbitmq:
        condition: service_started

  retrieval-service:
    build:
      context: .
      dockerfile: infra/docker/python-service.Dockerfile
      args:
        SERVICE_PATH: services/retrieval-service/app
        SERVICE_PORT: 8002
        REQUIREMENTS_GROUPS: ${RETRIEVAL_SERVICE_REQUIREMENTS_GROUPS:-base,graph}
    env_file: .env
    environment:
      SERVICE_NAME: retrieval-service
      SERVICE_PORT: 8002
      EMBEDDING_PROVIDER: ${DOCKER_EMBEDDING_PROVIDER:-hash}
      EMBEDDING_MODEL_NAME: ${DOCKER_EMBEDDING_MODEL_NAME:-hash-1024}
      HF_HOME: /opt/hf-cache
      PRELOAD_EMBEDDING_MODEL: ${PRELOAD_EMBEDDING_MODEL:-${PRELOAD_BGE_M3:-false}}
    ports:
      - "8002:8002"
    volumes:
      - hf_cache:/opt/hf-cache
    depends_on:
      postgres:
        condition: service_started
      neo4j:
        condition: service_healthy
      redis:
        condition: service_started

  graph-service:
    build:
      context: .
      dockerfile: infra/docker/python-service.Dockerfile
      args:
        SERVICE_PATH: services/graph-service/app
        SERVICE_PORT: 8003
        REQUIREMENTS_GROUPS: base,graph
    env_file: .env
    environment:
      SERVICE_NAME: graph-service
      SERVICE_PORT: 8003
    ports:
      - "8003:8003"
    depends_on:
      neo4j:
        condition: service_healthy

  llm-orchestrator:
    build:
      context: .
      dockerfile: infra/docker/python-service.Dockerfile
      args:
        SERVICE_PATH: services/llm-orchestrator/app
        SERVICE_PORT: 8004
        REQUIREMENTS_GROUPS: base
    env_file: .env
    environment:
      SERVICE_NAME: llm-orchestrator
      SERVICE_PORT: 8004
    ports:
      - "8004:8004"
    depends_on:
      - redis

  worker:
    build:
      context: .
      dockerfile: infra/docker/python-service.Dockerfile
      args:
        SERVICE_PATH: services/worker/app
        SERVICE_PORT: 8005
        REQUIREMENTS_GROUPS: base
    env_file: .env
    environment:
      SERVICE_NAME: worker
      SERVICE_PORT: 8005
    ports:
      - "8005:8005"
    depends_on:
      postgres:
        condition: service_healthy

  worker-runner:
    build:
      context: .
      dockerfile: infra/docker/python-service.Dockerfile
      args:
        SERVICE_PATH: services/worker/app
        SERVICE_PORT: 8005
        REQUIREMENTS_GROUPS: ${WORKER_RUNNER_REQUIREMENTS_GROUPS:-base,queue,storage,graph,parsing}
        INSTALL_OCR_SYSTEM_DEPS: ${WORKER_RUNNER_INSTALL_OCR_SYSTEM_DEPS:-true}
    env_file: .env
    environment:
      SERVICE_NAME: worker-runner
      SERVICE_PORT: 8005
      EMBEDDING_PROVIDER: ${DOCKER_EMBEDDING_PROVIDER:-hash}
      EMBEDDING_MODEL_NAME: ${DOCKER_EMBEDDING_MODEL_NAME:-hash-1024}
      HF_HOME: /opt/hf-cache
      PRELOAD_EMBEDDING_MODEL: ${PRELOAD_EMBEDDING_MODEL:-${PRELOAD_BGE_M3:-false}}
    command:
      - sh
      - -c
      - cd /app/services/worker/app && celery -A celery_app:celery_app worker --loglevel=info --without-mingle --without-gossip -Q document.parse,document.chunk,document.embed,graph.extract,graph.upsert,document.dead_letter
    volumes:
      - hf_cache:/opt/hf-cache
    depends_on:
      postgres:
        condition: service_started
      rabbitmq:
        condition: service_started
      redis:
        condition: service_started
      rustfs:
        condition: service_started
      neo4j:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: chatbot_graph
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres -d chatbot_graph || exit 1
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:4-management
    ports:
      - "5672:5672"
      - "15672:15672"

  neo4j:
    image: neo4j:5.26
    environment:
      NEO4J_AUTH: neo4j/graphpassword
    healthcheck:
      test:
        - CMD-SHELL
        - cypher-shell -a bolt://localhost:7687 -u neo4j -p graphpassword "RETURN 1;" || exit 1
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 20s
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  rustfs:
    image: rustfs/rustfs:latest
    environment:
      RUSTFS_ACCESS_KEY: admin
      RUSTFS_SECRET_KEY: adminadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - rustfs_data:/data
      - rustfs_logs:/logs

volumes:
  hf_cache:
  neo4j_data:
  postgres_data:
  rustfs_data:
  rustfs_logs:
